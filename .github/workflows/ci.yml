name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  cli:
    name: CLI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy, rustfmt

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check CLI
        run: bun run --cwd cli ci

  mcp:
    name: MCP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build MCP dependencies
        run: |
          bun run --cwd packages/protocol build
          bun run --cwd packages/oauth-core build
          bun run --cwd sdk build

      - name: Check MCP
        run: bun run --cwd mcp typecheck

      - name: Build MCP
        run: bun run --cwd mcp build

      - name: Lint MCP
        run: bun run --cwd mcp lint

      - name: Test MCP
        run: bun run --cwd mcp test
