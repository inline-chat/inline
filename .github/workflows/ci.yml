name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  cli:
    name: CLI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format CLI
        run: bun run --cwd cli format

      - name: Check CLI
        run: bun run --cwd cli typecheck

      - name: Build CLI
        run: bun run --cwd cli build

      - name: Lint CLI
        run: bun run --cwd cli lint

      - name: Test CLI
        run: bun run --cwd cli test

  mcp:
    name: MCP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build MCP dependencies
        run: |
          bun run --cwd packages/protocol build
          bun run --cwd packages/oauth-core build
          bun run --cwd packages/sdk build

      - name: Check MCP
        run: bun run --cwd packages/mcp typecheck

      - name: Build MCP
        run: bun run --cwd packages/mcp build

      - name: Lint MCP
        run: bun run --cwd packages/mcp lint

      - name: Test MCP
        run: bun run --cwd packages/mcp test
