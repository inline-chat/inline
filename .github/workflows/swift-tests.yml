name: Swift Tests

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/swift-tests.yml"
      - "apple/InlineKit/**"
      - "apple/InlineUI/**"
      - "apple/InlineIOSUI/**"
      - "apple/InlineMacUI/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/swift-tests.yml"
      - "apple/InlineKit/**"
      - "apple/InlineUI/**"
      - "apple/InlineIOSUI/**"
      - "apple/InlineMacUI/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Swift Tests (${{ matrix.package }})
    runs-on: macos-26
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: InlineKit
            path: apple/InlineKit
            test_args: --no-parallel
          - package: InlineUI
            path: apple/InlineUI
            test_args: ""
          - package: InlineIOSUI
            path: apple/InlineIOSUI
            test_args: ""
          - package: InlineMacUI
            path: apple/InlineMacUI
            test_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Preflight
        id: preflight
        env:
          XCODE_PATH: ${{ vars.MACOS_XCODE_PATH }}
        run: |
          set -euo pipefail
          sw_vers
          echo "Available Xcodes:"
          ls -d /Applications/Xcode*.app 2>/dev/null || true
          # Prefer the newest stable versioned Xcode install on CI so Swift package checks
          # follow the latest released Xcode instead of the runner default or a stale override.
          stable_xcode_path="$(ls -d /Applications/Xcode_*.app 2>/dev/null | grep -v '_beta\\.app$' | sort -V | tail -n 1 || true)"
          beta_xcode_path="$(ls -d /Applications/Xcode_*_beta.app 2>/dev/null | sort -V | tail -n 1 || true)"
          if [[ -n "${stable_xcode_path}" ]]; then
            xcode_path="${stable_xcode_path}"
          elif [[ -n "${XCODE_PATH:-}" && -d "${XCODE_PATH}" ]]; then
            xcode_path="${XCODE_PATH}"
          elif [[ -d "/Applications/Xcode.app" ]]; then
            xcode_path="/Applications/Xcode.app"
          else
            xcode_path="${beta_xcode_path}"
          fi
          if [[ -z "${xcode_path}" ]]; then
            echo "No suitable Xcode found on runner." >&2
            exit 1
          fi
          echo "Using Xcode path: ${xcode_path}"
          echo "xcode_path=${xcode_path}" >> "${GITHUB_OUTPUT}"

      - name: Set Xcode version
        run: sudo xcode-select -s "${{ steps.preflight.outputs.xcode_path }}"

      - name: Swift Version
        run: xcrun swift --version

      - name: Xcode Version
        run: xcodebuild -version

      - name: Build ${{ matrix.package }}
        working-directory: ${{ matrix.path }}
        run: xcrun swift build

      - name: Test ${{ matrix.package }}
        working-directory: ${{ matrix.path }}
        run: xcrun swift test ${{ matrix.test_args }}
